name: 급등주 데이터 자동 업데이트

on:
  schedule:
    # 오후 5:30 KST = 08:30 UTC (월~금)
    - cron: "30 8 * * 1-5"
    # 오후 11:00 KST = 14:00 UTC (월~금)
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Python 패키지 설치
        run: |
          pip install --upgrade pip
          pip install selenium yfinance requests beautifulsoup4 webdriver-manager

      - name: 급등주 데이터 수집
        run: |
          python scripts/fetch_data.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: JSON을 public 폴더에 복사
        run: |
          mkdir -p client/public/data
          cp data/stocks.json client/public/data/stocks.json

      - name: 데이터 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json client/public/data/stocks.json
          git diff --staged --quiet || git commit -m "📈 급등주 자동 업데이트 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
          git push
